<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="gn" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#g)" opacity="0.08"/>

  <!-- Connections (lines between nodes) -->
  <!-- Center to outer ring -->
  <line x1="128" y1="128" x2="56" y2="52" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="128" y1="128" x2="200" y2="52" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="128" y1="128" x2="32" y2="128" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="128" y1="128" x2="224" y2="128" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="128" y1="128" x2="56" y2="204" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="128" y1="128" x2="200" y2="204" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Cross-links (molecular bonds) -->
  <line x1="56" y1="52" x2="32" y2="128" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="56" y1="52" x2="200" y2="52" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="200" y1="52" x2="224" y2="128" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="32" y1="128" x2="56" y2="204" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="224" y1="128" x2="200" y2="204" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="56" y1="204" x2="200" y2="204" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Nodes (stars/atoms) with glow -->
  <!-- Center node (largest) -->
  <circle cx="128" cy="128" r="18" fill="url(#g)"/>
  <circle cx="128" cy="128" r="18" fill="url(#g)" opacity="0.4" filter="blur(6px)"/>

  <!-- Outer nodes -->
  <circle cx="56" cy="52" r="12" fill="url(#g)"/>
  <circle cx="56" cy="52" r="12" fill="url(#g)" opacity="0.35" filter="blur(4px)"/>

  <circle cx="200" cy="52" r="12" fill="url(#gn)"/>
  <circle cx="200" cy="52" r="12" fill="url(#gn)" opacity="0.35" filter="blur(4px)"/>

  <circle cx="32" cy="128" r="12" fill="url(#gn)"/>
  <circle cx="32" cy="128" r="12" fill="url(#gn)" opacity="0.35" filter="blur(4px)"/>

  <circle cx="224" cy="128" r="12" fill="url(#g)"/>
  <circle cx="224" cy="128" r="12" fill="url(#g)" opacity="0.35" filter="blur(4px)"/>

  <circle cx="56" cy="204" r="12" fill="url(#gn)"/>
  <circle cx="56" cy="204" r="12" fill="url(#gn)" opacity="0.35" filter="blur(4px)"/>

  <circle cx="200" cy="204" r="12" fill="url(#g)"/>
  <circle cx="200" cy="204" r="12" fill="url(#g)" opacity="0.35" filter="blur(4px)"/>
</svg>
