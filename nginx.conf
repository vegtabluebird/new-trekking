server {
    listen 80;
    listen [::]:80;
    server_name newTrekking.com www.newTrekking.com;
    # 强制跳转 HTTPS
    return 301 https://newTrekking.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.newTrekking.com;

    # 宝塔证书路径（安装证书后自动生成）
    ssl_certificate     /www/server/panel/vhost/cert/newTrekking.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/newTrekking.com/privkey.pem;

    # www → 非www 301
    return 301 https://newTrekking.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name newTrekking.com;

    # ── SSL ──
    ssl_certificate     /www/server/panel/vhost/cert/newTrekking.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/newTrekking.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── 根目录（静态 HTML 站） ──
    root /www/wwwroot/newTrekking;
    index index.html;
    charset utf-8;

    # ── Gzip 压缩 ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/javascript text/xml
        application/javascript application/json application/xml
        image/svg+xml font/woff font/woff2;

    # ── 安全响应头 ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── 静态资源长缓存 ──
    location ~* \.(js|css|woff|woff2|ttf|eot|ico|svg|webp|png|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── JSON 多语言文件（不缓存，方便更新） ──
    location /locales/ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
    }

    # ── HTML 不缓存 ──
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ── SPA-style 路由：目录下有 index.html 则直接返回 ──
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    # ── robots.txt & sitemap 直接访问 ──
    location = /robots.txt  { access_log off; }
    location = /sitemap.xml { access_log off; }

    # ── 尾斜杠规范化（移除多余斜杠） ──
    # 已由 try_files 处理，Nginx 默认合并多余斜杠

    # ── 404 页 ──
    error_page 404 /404.html;
    location = /404.html { internal; }

    # ── 访问日志 ──
    access_log  /www/wwwlogs/newTrekking.com.log;
    error_log   /www/wwwlogs/newTrekking.com.error.log;
}
